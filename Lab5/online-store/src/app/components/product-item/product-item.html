<div class="card">
  <div class="img-wrap">
    <img class="img" [src]="product.image" [alt]="product.name" />
  </div>
  <h3 class="name">{{ product.name }}</h3>
  <p class="desc">{{ product.description }}</p>

  <div class="row">
    <span class="price">{{ product.price }} kzt</span>

    <span class="rating">{{ getStars(product.rating) }} {{ product.rating }}</span>
  </div>

  <div class="actions">
    <a class="link" [href]="product.link" target="_blank" rel="noopener noreferrer">
      Open on Kaspi
    </a>

    <button class="btn" (click)="shareWhatsApp()">Share WhatsApp</button>
    <button class="btn" (click)="shareTelegram()">Share Telegram</button>
  </div>
  <div class="actions-row">
    <button class="btn" (click)="onLike()">❤️ Like ({{ product.likes }})</button>
    <button class="btn danger" (click)="onDelete()">🗑 Delete</button>
  </div>
</div>
