<h2>Albums</h2>

<div *ngIf="loading" class="info">Loading albums...</div>
<div *ngIf="error" class="error">{{ error }}</div>

<div *ngIf="!loading && !error && albums.length === 0" class="info">
  No albums found.
</div>

<ul class="list" *ngIf="!loading && albums.length > 0">
  <li class="item" *ngFor="let album of albums" (click)="openAlbum(album.id)">
    <div class="meta">
      <div class="id">#{{ album.id }}</div>
      <div class="title">{{ album.title }}</div>
    </div>

    <button class="danger" (click)="deleteAlbum(album.id, $event)">Delete</button>
  </li>
</ul>
