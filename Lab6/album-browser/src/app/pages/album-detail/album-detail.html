<h2>Album Details</h2>

<div *ngIf="loading" class="info">Loading album...</div>
<div *ngIf="error" class="error">{{ error }}</div>
<div *ngIf="message" class="ok">{{ message }}</div>

<div *ngIf="!loading && album" class="card">
  <div><b>ID:</b> {{ album.id }}</div>
  <div><b>User ID:</b> {{ album.userId }}</div>

  <label class="label">
    <b>Title:</b>
    <input [(ngModel)]="editedTitle" placeholder="Album title" />
  </label>

  <div class="actions">
    <button (click)="save()">Save</button>
    <button (click)="viewPhotos()">View Photos</button>
    <button (click)="backToAlbums()">Back</button>
  </div>
</div>
